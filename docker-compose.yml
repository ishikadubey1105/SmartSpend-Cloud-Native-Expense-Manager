version: '3.9'

services:
  # ── Backend API ──────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smartspend-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: http://localhost
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
    networks:
      - smartspend-net
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:5000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend ──────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://server:5000/api
    container_name: smartspend-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - smartspend-net

networks:
  smartspend-net:
    driver: bridge
